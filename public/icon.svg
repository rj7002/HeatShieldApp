      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#020617"/>
  <!-- Shield shape -->
  <path d="M256 72 L408 136 L408 268 Q408 378 256 448 Q104 378 104 268 L104 136 Z"
