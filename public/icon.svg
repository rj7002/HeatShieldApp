  <rect x="240" y="158" width="32" height="130" rx="16" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <!-- Thermometer fill -->
  <rect x="248" y="210" width="16" height="84" rx="4" fill="white" opacity="0.95"/>
