  <circle cx="256" cy="306" r="26" fill="white" opacity="0.15"/>
  <circle cx="256" cy="306" r="26" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <circle cx="256" cy="306" r="18" fill="white" opacity="0.95"/>
  <!-- Heat lines -->
  <line x1="284" y1="186" x2="300" y2="186" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="284" y1="210" x2="296" y2="210" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="284" y1="234" x2="300" y2="234" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
